<section class="tours-popular">
    <div class="caixa-titulo">
        <p class="titulo-tours">
            Find Popular Tours</p>
        <p class="descricao-tours">See all</p>
    </div>
    <div class="conteiner-tours">
        @for (item of tours; track item.pais){
        <div class="caixa-tours">
            <img src="/assets/tours/{{item.img}}" alt="img-tours">
            <p class="texto-pais">
                {{item.pais}}</p>

            <p class="texto-descricao">
                {{item.descricao}}</p>
            <div class="caixa-avaliacoes">
                <p class="avaliacao"> {{item.avaliacao}}</p>
                <hr>
                <p class="dias">{{item.avaliacao}} days</p>
                <p class="valor">from {{item.preco}}</p>

            </div>
        </div>
        }
    </div>
</section>
