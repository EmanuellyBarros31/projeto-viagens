<section class="section-carrosel">
    <div class="carrosel">
        <div class="caixa-box-titulo">
            <p class="box-titulo">Trending destinations</p>
            <p class="box-descricao">see all</p>
        </div>
        <div class="box-turismo">

            @for (item of tours; track item.pais){

            <div class="{{item.pais.toLowerCase()}}">
                <img class="box-img" src="assets/carrosel/{{item.img}}" alt="imagem de {{item.pais}}">
                <div class="caixa-texto-turismo">
                    <p class="texto-pais">{{item.pais}}</p>
                    <p class="texto-tours">{{item.tours}}</p>
                </div>
            </div>
            }
        </div>
    </div>
</section>
